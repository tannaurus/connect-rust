version: v1
name: buf.build/connectrpc/rust
plugin_version: v0.1.0
source_url: https://github.com/anthropics/connect-rust
description: Generates ConnectRPC service traits, extension traits, and typed clients for Rust. Compatible with the Connect, gRPC, and gRPC-Web protocols.
output_languages:
  - rust
spdx_license_id: Apache-2.0
license_url: https://github.com/anthropics/connect-rust/blob/main/LICENSE
registry:
  cargo:
    rust_version: "1.85"
    deps:
      - name: connectrpc
        version_requirement: "0.1.0"
      - name: buffa
        version_requirement: "0.1"
        features:
          - serde
      - name: buffa-types
        version_requirement: "0.1"
        features:
          - serde
      - name: serde
        version_requirement: "1"
        features:
          - derive
      - name: futures
        version_requirement: "0.3"
      - name: http-body
        version_requirement: "1"
